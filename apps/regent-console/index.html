<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Regent · 对话工作区</title>
  <style>
    :root{color-scheme:dark;--bg:#151515;--side:#0f0f0f;--panel:#212121;--hover:#2b2b2b;--line:#343434;--text:#ececec;--muted:#a8a8a8;--accent:#10a37f;--danger:#f36b7f}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font:15px/1.55 system-ui,-apple-system,"Segoe UI",sans-serif}.app{display:grid;grid-template-columns:280px minmax(0,1fr);height:100vh}.sidebar{background:var(--side);border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0}.brand{display:flex;align-items:center;gap:10px;padding:18px;font-weight:700}.mark{display:grid;place-items:center;width:30px;height:30px;border-radius:9px;background:var(--accent);color:white}.new{margin:0 12px 14px;padding:11px 13px;border:1px solid var(--line);border-radius:10px;background:transparent;color:var(--text);text-align:left;cursor:pointer}.new:hover,.thread:hover{background:var(--hover)}.threads{overflow:auto;padding:0 8px;flex:1}.thread{display:block;width:100%;padding:10px;border:0;border-radius:9px;background:transparent;color:var(--text);text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}.thread.active{background:var(--hover)}.sidefoot{padding:14px 18px;border-top:1px solid var(--line);color:var(--muted);font-size:13px}.main{display:grid;grid-template-rows:auto 1fr auto;min-width:0}.top{height:62px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 22px}.title{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}.health{font-size:13px;color:var(--muted)}.health.ok{color:#65d9bb}.health.bad{color:var(--danger)}.messages{overflow:auto;padding:30px 20px 140px}.stream{max-width:780px;margin:auto}.empty{text-align:center;margin:15vh auto;color:var(--muted)}.empty h1{color:var(--text);font-size:30px;margin-bottom:8px}.prompt{margin-top:24px;border:1px solid var(--line);border-radius:12px;padding:12px 16px;background:transparent;color:var(--text);cursor:pointer}.prompt:hover{background:var(--hover)}.message{display:grid;grid-template-columns:36px minmax(0,1fr);gap:13px;margin:0 0 28px}.avatar{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;background:#414141;font-weight:700}.assistant .avatar,.event .avatar{background:var(--accent)}.body{min-width:0}.meta{font-weight:650;margin-bottom:4px}.content{white-space:pre-wrap;overflow-wrap:anywhere}.event .content{color:#c8e9df}.details{margin-top:10px;padding:10px 12px;border-left:2px solid var(--accent);background:#1b2724;color:var(--muted);font-size:13px}.composer-wrap{position:fixed;left:280px;right:0;bottom:0;padding:25px 20px 22px;background:linear-gradient(transparent,var(--bg) 35%)}.composer{max-width:780px;margin:auto;border:1px solid var(--line);border-radius:18px;background:var(--panel);padding:12px 12px 10px;box-shadow:0 8px 30px #0005}.composer textarea{display:block;width:100%;min-height:54px;max-height:180px;resize:none;border:0;outline:0;background:transparent;color:var(--text);font:inherit}.actions{display:flex;align-items:center;justify-content:space-between;color:var(--muted);font-size:12px}.send{width:36px;height:36px;border:0;border-radius:50%;background:var(--text);color:#151515;font-size:18px;cursor:pointer}.send:disabled{opacity:.3;cursor:wait}.mobile-menu{display:none;background:transparent;border:0;color:var(--text);font-size:20px}@media(max-width:760px){.app{grid-template-columns:1fr}.sidebar{display:none}.sidebar.open{display:flex;position:fixed;inset:0 20% 0 0;z-index:4}.composer-wrap{left:0}.mobile-menu{display:block}.top{padding:0 14px}.messages{padding-inline:14px}.message{grid-template-columns:32px minmax(0,1fr)}}
  .confirm-card{margin-top:12px;padding:18px;border:1px solid #3d5f56;border-radius:14px;background:#19231f}.confirm-card h3{margin:0 0 12px}.facts{display:grid;grid-template-columns:120px 1fr;gap:8px 14px}.facts dt{color:var(--muted)}.facts dd{margin:0}.confirm{margin-top:16px;border:0;border-radius:10px;padding:10px 14px;background:var(--accent);color:white;font-weight:700;cursor:pointer}.confirm:disabled{opacity:.45}</style>
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><span class="mark">R</span> Regent</div>
    <button class="new" id="newChat">＋ 新建 App</button>
    <div class="threads" id="threads"></div>
    <div class="sidefoot">所有对话、执行与决策均持久保存</div>
  </aside>
  <main class="main">
    <header class="top"><button class="mobile-menu" id="menu">☰</button><div class="title" id="title">新任务</div><div class="health" id="health">正在连接…</div></header>
    <section class="messages" id="messages"><div class="stream" id="stream"></div></section>
    <div class="composer-wrap"><div class="composer"><textarea id="input" placeholder="描述目标，或指导 Regent 调整方向…"></textarea><div class="actions"><span id="hint">Enter 发送，Shift + Enter 换行</span><button class="send" id="send" aria-label="发送">↑</button></div></div></div>
  </main>
</div>
<script>
const newId=()=>{const c=window.crypto||window.msCrypto;if(c&&typeof c.randomUUID==='function')return c.randomUUID();const b=new Uint8Array(16);if(c&&typeof c.getRandomValues==='function')c.getRandomValues(b);else for(let i=0;i<b.length;i++)b[i]=Math.floor(Math.random()*256);b[6]=(b[6]&15)|64;b[8]=(b[8]&63)|128;const h=Array.from(b,x=>x.toString(16).padStart(2,'0')).join('');return h.slice(0,8)+'-'+h.slice(8,12)+'-'+h.slice(12,16)+'-'+h.slice(16,20)+'-'+h.slice(20)};
const $=id=>document.getElementById(id),actor='trial-user';let current=null,currentProject=null,conversations=[],projects=[];
const api=async(path,body,method)=>{const r=await fetch(path,{method:method||(body?'POST':'GET'),headers:{'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});const text=await r.text();let data;try{data=JSON.parse(text)}catch{data={message:text}}if(!r.ok)throw new Error(data?.error?.message||data?.detail||`${r.status} ${text}`);return data};
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function health(){try{const h=await api('/health/ready');$('health').textContent=`${h.environment} · 服务正常`;$('health').className='health ok'}catch{$('health').textContent='服务不可用';$('health').className='health bad'}}
function renderThreads(){$('threads').innerHTML=projects.map(p=>`<button class="thread ${currentProject?.id===p.id?'active':''}" data-id="${p.id}">${esc(p.name)}</button>`).join('');document.querySelectorAll('.thread').forEach(b=>b.onclick=()=>openProject(b.dataset.id))}
function confirmationCard(m){const u=m.metadata?.understanding||{};const criteria=Object.entries(u.success_criteria||{}).map(([k,v])=>`${esc(k)}：${esc(v)}`).join('<br>')||'等待补充';return `<div class="confirm-card"><h3>我理解的产品</h3><dl class="facts"><dt>App 名称</dt><dd>${esc(u.app_name)}</dd><dt>目标用户</dt><dd>${esc(u.target_users)}</dd><dt>解决问题</dt><dd>${esc(u.problem)}</dd><dt>首轮交付</dt><dd>${esc(u.first_deliverable)}</dd><dt>成功标准</dt><dd>${criteria}</dd><dt>明确约束</dt><dd>${esc(JSON.stringify(u.explicit_constraints||{}))}</dd></dl><button class="confirm" data-project="${m.metadata.app_project_id}" data-goal="${m.metadata.goal_id}" data-hash="${m.metadata.goal_spec_hash||''}">确认并开始</button></div>`}
function messageHtml(m){const card=m.message_type==='APP_CONFIRMATION_REQUIRED'?confirmationCard(m):'';const preview=m.message_type==='PREVIEW_READY'&&m.metadata?.endpoint?`<p><a class="confirm" href="${esc(m.metadata.endpoint)}" target="_blank">打开 App 预览</a></p>`:'';const details=m.message_type==='APP_CONFIRMATION_REQUIRED'?'':(Object.keys(m.metadata||{}).length?`<div class="details">${esc(JSON.stringify(m.metadata,null,2))}</div>`:'');return `<article class="message ${m.role.toLowerCase()}"><div class="avatar">${m.role==='USER'?'你':'R'}</div><div class="body"><div class="meta">${m.role==='USER'?'你':m.role==='EVENT'?'任务进展':'Regent'}</div><div class="content">${esc(m.content)}</div>${card}${preview}${details}</div></article>`}
function renderMessages(items=[]){if(!current){$('stream').innerHTML='<div class="empty"><h1>创建你的第一个 App</h1><p>先描述产品想法。Core 会展示理解卡，只有确认后才开始执行。</p><button class="prompt" id="selfImprove">让 Regent 检查并改进自身</button></div>';$('selfImprove').onclick=()=>{$('input').value='检查 Regent 当前最重要的产品或工程缺口，提出一个可验证的改进假设，在隔离环境实现并验证；不要修改生产环境或降低治理要求。';$('input').focus()};return}$('stream').innerHTML=items.length?items.map(messageHtml).join(''):'<div class="empty"><h1>描述这个 App</h1></div>';document.querySelectorAll('.confirm').forEach(b=>b.onclick=()=>confirmAndStart(b));$('messages').scrollTop=$('messages').scrollHeight}
async function loadWorkspace(openFirst=true){[projects,conversations]=await Promise.all([api('/v1/app-projects'),api('/v1/conversations')]);renderThreads();if(openFirst&&!current&&projects.length)await openProject(projects[0].id);else if(!projects.length)renderMessages()}
async function openProject(id){currentProject=projects.find(p=>p.id===id)||await api(`/v1/app-projects/${id}`);current=conversations.find(c=>c.app_project_id===id)||null;$('title').textContent=`${currentProject.name} · ${currentProject.status}`;renderThreads();renderMessages(current?await api(`/v1/conversations/${current.id}/messages`):[]);$('sidebar').classList.remove('open')}
async function record(role,content,message_type='TEXT',metadata={}){return api(`/v1/conversations/${current.id}/messages`,{role,message_type,content,actor,metadata:{...metadata,idempotency_key:'console-'+newId()}})}
async function refresh(){if(current)renderMessages(await api(`/v1/conversations/${current.id}/messages`))}
async function createAppDraft(idea){$('hint').textContent='Core 正在形成产品理解草案…';const draft=await api('/v1/app-projects/drafts',{idea,actor});await loadWorkspace(false);currentProject=projects.find(p=>p.id===draft.project.id)||draft.project;current=conversations.find(c=>c.id===draft.conversation_id)||await api(`/v1/conversations/${draft.conversation_id}`);$('title').textContent=`${currentProject.name} · 待确认`;$('hint').textContent='确认前不会开始规划、生成或发布';renderThreads();await refresh()}
async function confirmAndStart(button){button.disabled=true;try{const projectId=button.dataset.project,goalId=button.dataset.goal;let hash=button.dataset.hash;if(!hash){const state=await api(`/v1/app-projects/${projectId}/status`);hash=state.goal_spec?.content_hash}if(!hash)throw new Error('缺少目标版本哈希，请刷新后重试');const confirmed=await api(`/v1/app-projects/${projectId}/confirm`,{actor,expected_spec_hash:hash});currentProject=confirmed.project;await api(`/v1/goals/${goalId}/start`,{actor,idempotency_key:'console-start-'+goalId});$('hint').textContent='Core 已开始执行，你无需继续操作';await loadWorkspace(false);await openProject(projectId)}catch(e){$('hint').textContent=e.message;$('hint').style.color='var(--danger)'}finally{button.disabled=false}}
async function send(){const text=$('input').value.trim();if(!text||$('send').disabled)return;$('send').disabled=true;$('input').value='';try{if(!current)await createAppDraft(text);else{const result=await api(`/v1/app-projects/${currentProject.id}/guidance`,{message:text,actor});await refresh();if(result.requires_confirmation)$('hint').textContent='目标已修订，请确认新版本后继续'}}catch(e){$('hint').textContent=e.message;$('hint').style.color='var(--danger)'}finally{$('send').disabled=false}}
$('send').onclick=send;$('input').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}};$('newChat').onclick=()=>{current=null;currentProject=null;$('title').textContent='新建 App';renderThreads();renderMessages();$('input').focus()};$('menu').onclick=()=>$('sidebar').classList.toggle('open');renderMessages();health();loadWorkspace().catch(()=>{$('hint').textContent='暂时无法加载 App 历史，请稍后重试'});setInterval(async()=>{if(!currentProject)return;try{const state=await api(`/v1/app-projects/${currentProject.id}/status`),stage=state.goal.metadata?.execution_stage||state.goal.status;$('title').textContent=`${currentProject.name} · ${stage}`;if(state.preview?.status==='PREVIEW_READY')$('hint').textContent='预览已就绪，可以开始真实体验验证';else if(state.preview?.status==='FAILED')$('hint').textContent=state.preview.failure_summary||'生成失败，可以发送“继续”安全重试';await refresh()}catch{}},3000);
</script>
</body>
</html>
